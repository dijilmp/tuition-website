{% load static %}

<!DOCTYPE html>
<html>

<head>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Login - Master X's Academy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f5f7fb;">

<div class="container">

    <div class="row justify-content-center align-items-center"
         style="min-height:100vh;">

        <div class="col-md-4">

            <div class="card shadow border-0">

                <div class="card-body p-4">

                    <div class="text-center mb-4">

                        <img src="{% static 'images/logo.png' %}"
                             width="90"
                             height="90"
                             class="rounded-circle mb-3">

                        <h3 class="fw-bold">
                            Master X's Academy
                        </h3>

                        <p class="text-muted">
                            Your Learning Partner
                        </p>

                    </div>

                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
